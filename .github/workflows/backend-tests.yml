name: Backend Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          "$(go env GOPATH)"/bin/staticcheck ./...

      - name: Run unit tests with race detector and coverage
        run: go test -count=1 -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Print coverage summary
        run: go tool cover -func=coverage.out | tail -20

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)"/bin/govulncheck ./...

  postgres-tests:
    name: Go Tests (Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: conduit
          POSTGRES_PASSWORD: conduit
          POSTGRES_DB: conduit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U conduit -d conduit_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run store tests against Postgres
        env:
          CONDUIT_TEST_POSTGRES_URL: postgres://conduit:conduit@127.0.0.1:5432/conduit_test?sslmode=disable
        run: go test -count=1 -race ./internal/store/...
