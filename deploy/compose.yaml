services:
  backend:
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
    environment:
      GATEWAY_ADMIN_TOKEN: ${GATEWAY_ADMIN_TOKEN:-}
      GATEWAY_BOOTSTRAP_GATEWAY_KEY: ${GATEWAY_BOOTSTRAP_GATEWAY_KEY:-}
      GATEWAY_BIND: :8080
      GATEWAY_STATE_PATH: /data/gateway.db
      GATEWAY_ENABLE_REALTIME: ${GATEWAY_ENABLE_REALTIME:-true}
      GATEWAY_REQUEST_HISTORY: ${GATEWAY_REQUEST_HISTORY:-200}
      GATEWAY_PROBE_INTERVAL_SECONDS: ${GATEWAY_PROBE_INTERVAL_SECONDS:-180}
    volumes:
      - gateway-data:/data
    ports:
      - "${GATEWAY_BACKEND_PORT:-18092}:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/docker/frontend.Dockerfile
    environment:
      GATEWAY_BASE_URL: ${GATEWAY_PUBLIC_BACKEND_URL:-https://api.synara.quest}
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    depends_on:
      - backend
    ports:
      - "${GATEWAY_FRONTEND_PORT:-18093}:3000"
    restart: unless-stopped

volumes:
  gateway-data:
